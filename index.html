            { 
                q: { pt: "O que Jesus e os apóstolos fizeram logo antes de irem embora?", en: "What did Jesus and the apostles do right before leaving?", es: "¿Qué hicieron Jesús y los apóstoles justo antes de irse?", ht: "Kisa Jezi ak apòt li yo te fè touswit anvan yo te ale?" },
                o: { pt: ["Foram comer mais pão", "Cantaram músicas para Jeová", "Fizeram um desenho no chão"], en: ["Went to eat more bread", "Sang songs to Jehovah", "Drew a picture on the ground"], es: ["Fueron a comer más pan", "Cantaron canciones para Jehová", "Hicieron un dibujo en el suelo"], ht: ["Yo t al manje plis pen", "Yo te chante kantik pou Jewova", "Yo te fè yon desen atè a"] },
                c: 1, f: { pt: "Excelente! Eles terminaram aquela noite especial louvando a Jeová.", en: "Excellent! They finished that special night praising Jehovah.", es: "¡Excelente! Terminaron esa noche especial alabando a Jehová.", ht: "Ekselan! Yo te fini nuit espesyal sa a ap fè louwanj pou Jewova." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h86').innerText = t.h86;
            document.getElementById('txt-h87').innerText = t.h87;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c86 = document.getElementById('questoes-86');
            const c87 = document.getElementById('questoes-87');
            c86.innerHTML = ''; c87.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c86.appendChild(div);
                else c87.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
