<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Histórias 68 e 67</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f7ff;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .idioma-container {
            text-align: right;
            margin-bottom: 20px;
            background: #e1f0ff;
            padding: 10px;
            border-radius: 8px;
        }
        h1, h2 {
            text-align: center;
            color: #1e5ab0;
        }
        h3 {
            color: #1e5ab0;
            border-bottom: 2px solid #cfe4ff;
            padding-bottom: 5px;
            margin-top: 30px;
        }
        .pergunta {
            background-color: #ffffff;
            border: 1px solid #caddff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .pergunta p {
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }
        label:hover { background-color: #f0f8ff; }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }
        .correto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorreto { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #btn-verificar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1e5ab0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        #btn-verificar:hover { background-color: #16468a; }
        #resultado-final {
            margin-top: 30px;
            padding: 20px;
            background-color: #e1f0ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #1e5ab0;
        }
    </style>
</head>
<body>

    <div class="idioma-container">
        <label for="select-idioma">🌐 </label>
        <select id="select-idioma" onchange="mudarIdioma()">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ht">Kreyòl Ayisyen</option>
        </select>
    </div>

    <h1 id="txt-titulo">Quiz Bíblico para Crianças</h1>
    <p id="txt-subtitulo" style="text-align: center;">Aprenda sobre Zacarias, Elisabete e Maria!</p>

    <div id="quiz-container">
        <h3 id="txt-h68">História 68: Elisabete fica grávida</h3>
        <div id="questoes-68"></div>

        <h3 id="txt-h69">História 69: O anjo Gabriel visita Maria</h3>
        <div id="questoes-69"></div>
    </div>

    <button id="btn-verificar" onclick="verificarRespostas()">Verificar Respostas</button>

    <div id="resultado-final"></div>

    <script>
        const uiTextos = {
            pt: { titulo: "Quiz Bíblico para Crianças", subtitulo: "Histórias 68 e 69", h68: "História 68: Elisabete fica grávida", h69: "História 69: O anjo Gabriel visita Maria", btn: "Verificar Respostas", erro: "Responda todas as perguntinhas!", fim: "Muito bem!", acertou: "Você acertou", de: "de", corretaEra: "A resposta certa era: " },
            en: { titulo: "Bible Quiz for Kids", subtitulo: "Stories 68 and 69", h68: "Story 68: Elizabeth Gets Pregnant", h69: "Story 69: Angel Gabriel Visits Mary", btn: "Check Answers", erro: "Please answer all questions!", fim: "Great job!", acertou: "You got", de: "out of", corretaEra: "The correct answer was: " },
            es: { titulo: "Quiz Bíblico para Niños", subtitulo: "Historias 68 y 69", h68: "Historia 68: Elisabet queda embarazada", h69: "Historia 69: El ángel Gabriel visita a María", btn: "Verificar", erro: "¡Responde todas las preguntas!", fim: "¡Excelente!", acertou: "Acertaste", de: "de", corretaEra: "La respuesta era: " },
            ht: { titulo: "Kwiz Biblik pou Timoun", subtitulo: "Istwa 68 ak 69", h68: "Istwa 68: Elizabèt vin ansent", h69: "Istwa 69: Zanj Gabriyèl vizite Mari", btn: "Tcheke Repons yo", erro: "Tanpri reponn tout kesyon yo!", fim: "Bon travay!", acertou: "Ou jwenn", de: "sou", corretaEra: "Bon repons lan se te: " }
        };

        const dadosQuiz = [
            // HISTÓRIA 68
            { 
                q: { pt: "Quem eram Zacarias e Elisabete?", en: "Who were Zechariah and Elizabeth?", es: "¿Quiénes eran Zacarías y Elisabet?", ht: "Kilès Zakari ak Elizabèt te ye?" },
                o: { pt: ["Um rei e uma rainha", "Um sacerdote e sua esposa", "Dois pescadores"], en: ["A king and a queen", "A priest and his wife", "Two fishermen"], es: ["Un rey y una reina", "Un sacerdote y su esposa", "Dos pescadores"], ht: ["Yon wa ak yon rèn", "Yon prèt ak madanm li", "De pechè pwason"] },
                c: 1, f: { pt: "Certo! Eles eram muito fiéis a Jeová.", en: "Right! They were very faithful to Jehovah.", es: "¡Bien! Eran muy fieles a Jehová.", ht: "Wi! Yo te fidèl anpil ak Jewova." }
            },
            { 
                q: { pt: "Qual era o problema de Zacarias e Elisabete?", en: "What was Zechariah and Elizabeth's problem?", es: "¿Cuál era el problema de Zacarías y Elisabet?", ht: "Ki pwoblèm Zakari ak Elizabèt te genyen?" },
                o: { pt: ["Eles nunca tiveram filhos", "Eles não tinham casa", "Eles não gostavam de trabalhar"], en: ["They never had children", "They had no home", "They didn't like to work"], es: ["Nunca tuvieron hijos", "No tenían casa", "No les gustaba trabajar"], ht: ["Yo pa t janm gen pitit", "Yo pa t gen kay", "Yo pa t renmen travay"] },
                c: 0, f: { pt: "Isso. Eles já eram idosos e não tinham filhos.", en: "Yes. They were already old and had no children.", es: "Sí. Ya eran mayores y no tenían hijos.", ht: "Wi. Yo te granmoun deja e yo pa t gen pitit." }
            },
            { 
                q: { pt: "Quem apareceu para Zacarias no templo?", en: "Who appeared to Zechariah in the temple?", es: "¿Quién se le apareció a Zacarías en el templo?", ht: "Kilès ki te parèt devan Zakari nan tanp lan?" },
                o: { pt: ["O Rei", "Um amigo", "O anjo Gabriel"], en: ["The King", "A friend", "The angel Gabriel"], es: ["El Rey", "Un amigo", "El ángel Gabriel"], ht: ["Wa a", "Yon zanmi", "Zanj Gabriyèl"] },
                c: 2, f: { pt: "Exato! Gabriel trouxe boas notícias.", en: "Exactly! Gabriel brought good news.", es: "¡Exacto! Gabriel trajo buenas noticias.", ht: "Egzak! Gabriyèl te pote bon nouvèl." }
            },
            { 
                q: { pt: "Qual nome o anjo disse que o bebê teria?", en: "What name did the angel say the baby would have?", es: "¿Qué nombre dijo el ángel que tendría el bebé?", ht: "Ki non zanj lan te di tibebe a t apral genyen?" },
                o: { pt: ["João", "Zacarias Júnior", "Jesus"], en: ["John", "Zechariah Junior", "Jesus"], es: ["Juan", "Zacarías Junior", "Jesús"], ht: ["Jan", "Zakari pitit", "Jezi"] },
                c: 0, f: { pt: "Correto! O nome dele seria João.", en: "Correct! His name would be John.", es: "¡Correcto! Su nombre sería Juan.", ht: "Kòrèk! Non li se te Jan." }
            },
            { 
                q: { pt: "O que aconteceu com Zacarias por não acreditar no anjo?", en: "What happened to Zechariah for not believing the angel?", es: "¿Qué le pasó a Zacarías por no creer al ángel?", ht: "Kisa k te rive Zakari paske l pa t kwè zanj lan?" },
                o: { pt: ["Ele ficou cego", "Ele ficou mudo", "Ele teve que dormir no templo"], en: ["He became blind", "He became mute", "He had to sleep in the temple"], es: ["Se quedó ciego", "Se quedó mudo", "Tuvo que dormir en el templo"], ht: ["Li te vin avèg", "Li te vin bèbè", "Li te oblije dòmi nan tanp lan"] },
                c: 1, f: { pt: "Isso. Ele não conseguiu falar até o bebê nascer.", en: "Yes. He couldn't speak until the baby was born.", es: "Sí. No pudo hablar hasta que nació el bebé.", ht: "Wi. Li pa t ka pale jiskaske tibebe a fèt." }
            },
            { 
                q: { pt: "Como Zacarias falava com as pessoas lá fora?", en: "How did Zechariah talk to the people outside?", es: "¿Cómo hablaba Zacarías con la gente de afuera?", ht: "Ki jan Zakari te fè pale ak moun yo deyò a?" },
                o: { pt: ["Fazendo sinais com as mãos", "Escrevendo na areia", "Ele não falava com ninguém"], en: ["Making signs with his hands", "Writing in the sand", "He didn't talk to anyone"], es: ["Haciendo señas con las manos", "Escribiendo en la arena", "No hablaba con nadie"], ht: ["Li te fè siy ak men l", "Li te ekri nan sab", "Li pa t pale ak pèsonn"] },
                c: 0, f: { pt: "Certo! Ele fazia gestos porque estava mudo.", en: "Right! He made gestures because he was mute.", es: "¡Bien! Hacía gestos porque estaba mudo.", ht: "Wi! Li te fè siy paske li te bèbè." }
            },
            { 
                q: { pt: "Como os parentes queriam chamar o bebê?", en: "What did the relatives want to name the baby?", es: "¿Cómo querían llamar los parientes al bebé?", ht: "Ki non fanmi yo te vle bay tibebe a?" },
                o: { pt: ["Gabriel", "Zacarias", "Davi"], en: ["Gabriel", "Zechariah", "David"], es: ["Gabriel", "Zacarías", "David"], ht: ["Gabriyèl", "Zakari", "David"] },
                c: 1, f: { pt: "Isso! Eles queriam dar o nome do pai.", en: "Yes! They wanted to give him his father's name.", es: "¡Sí! Querían ponerle el nombre de su padre.", ht: "Wi! Yo te vle ba l non papa l." }
            },
            { 
                q: { pt: "Onde Zacarias escreveu o nome do filho?", en: "Where did Zechariah write his son's name?", es: "¿Dónde escribió Zacarías el nombre de su hijo?", ht: "Ki kote Zakari te ekri non pitit li a?" },
                o: { pt: ["Numa parede", "Num pedaço de pano", "Numa tabuinha"], en: ["On a wall", "On a piece of cloth", "On a small tablet"], es: ["En una pared", "En un pedazo de tela", "En una tablilla"], ht: ["Sou yon mi", "Sou yon moso twal", "Sou yon ti planch"] },
                c: 2, f: { pt: "Perfeito! Ele escreveu: 'O nome dele é João'.", en: "Perfect! He wrote: 'His name is John'.", es: "¡Perfecto! Escribió: 'Su nombre es Juan'.", ht: "Pafè! Li te ekri: 'Non li se Jan'." }
            },
            { 
                q: { pt: "Qual seria o trabalho especial de João?", en: "What would be John's special job?", es: "¿Cuál sería el trabajo especial de Juan?", ht: "Ki travay espesyal Jan t apral fè?" },
                o: { pt: ["Ser um soldado", "Preparar as pessoas para o Messias", "Construir muros"], en: ["To be a soldier", "To prepare people for the Messiah", "To build walls"], es: ["Ser un soldado", "Preparar a la gente para el Mesías", "Construir muros"], ht: ["Li t apral yon sòlda", "Prepare pèp la pou Mesi a", "Bati miray"] },
                c: 1, f: { pt: "Correto! Ele seria um profeta importante.", en: "Correct! He would be an important prophet.", es: "¡Correcto! Sería un profeta importante.", ht: "Kòrèk! Li t apral yon pwofèt enpòtan." }
            },
            { 
                q: { pt: "Para Deus, as coisas impossíveis são...", en: "For God, impossible things are...", es: "Para Dios, las cosas imposibles son...", ht: "Pou Bondye, bagay ki enposib yo se..." },
                o: { pt: ["Difíceis", "Tristes", "Possíveis"], en: ["Hard", "Sad", "Possible"], es: ["Difíciles", "Tristes", "Posibles"], ht: ["Difisil", "Tris", "Posib"] },
                c: 2, f: { pt: "Exato! Mateus 19:26 diz que tudo é possível para Ele.", en: "Exactly! Matthew 19:26 says all things are possible for Him.", es: "¡Exacto! Mateo 19:26 dice que todo es posible para Él.", ht: "Egzak! Matye 19:26 di tout bagay posib pou li." }
            },

            // HISTÓRIA 69
            { 
                q: { pt: "Onde morava a jovem Maria?", en: "Where did young Mary live?", es: "¿Dónde vivía la joven María?", ht: "Ki kote jenn fi yo rele Mari a te rete?" },
                o: { pt: ["Em Jerusalém", "Em Nazaré", "No Egito"], en: ["In Jerusalem", "In Nazareth", "In Egypt"], es: ["En Jerusalén", "En Nazaret", "En Egipto"], ht: ["Jerizalèm", "Nazarèt", "Lejip"] },
                c: 1, f: { pt: "Isso! Ela morava na Galileia.", en: "Right! She lived in Galilee.", es: "¡Sí! Vivía en Galilea.", ht: "Wi! Li te rete nan Galile." }
            },
            { 
                q: { pt: "Quem era o noivo de Maria?", en: "Who was Mary's fiancé?", es: "¿Quién era el prometido de María?", ht: "Kilès ki te fiyanse Mari?" },
                o: { pt: ["José, o carpinteiro", "Zacarias, o sacerdote", "Davi, o rei"], en: ["Joseph the carpenter", "Zechariah the priest", "David the king"], es: ["José el carpintero", "Zacarías el sacerdote", "David el rey"], ht: ["Jozèf, chapantye a", "Zakari, prèt la", "David, wa a"] },
                c: 0, f: { pt: "Correto! José era da família de Davi.", en: "Correct! Joseph was from David's family.", es: "¡Correcto! José era de la familia de David.", ht: "Kòrèk! Jozèf te soti nan fanmi David." }
            },
            { 
                q: { pt: "Qual era o nome do filho de Maria?", en: "What was the name of Mary's son?", es: "¿Cuál era el nombre del hijo de María?", ht: "Ki non pitit Mari a te ye?" },
                o: { pt: ["João", "Jesus", "Gabriel"], en: ["John", "Jesus", "Gabriel"], es: ["Juan", "Jesús", "Gabriel"], ht: ["Jan", "Jezi", "Gabriyèl"] },
                c: 1, f: { pt: "Certo! Jesus seria o Rei para sempre.", en: "Right! Jesus would be King forever.", es: "¡Bien! Jesús sería el Rey para siempre.", ht: "Wi! Jezi t apral Wa pou toutan." }
            },
            { 
                q: { pt: "Como Maria poderia ter um filho se era virgem?", en: "How could Mary have a son if she was a virgin?", es: "¿Cómo podría María tener un hijo si era virgen?", ht: "Ki jan Mari te ka gen yon pitit si l te vyèj?" },
                o: { pt: ["Com o poder de Jeová", "Com a ajuda de médicos", "Ela não sabia"], en: ["With Jehovah's power", "With the help of doctors", "She didn't know"], es: ["Con el poder de Jehová", "Con la ayuda de médicos", "No lo sabía"], ht: ["Avèk pouvwa Jewova", "Avèk sekou doktè yo", "Li pa t konnen"] },
                c: 0, f: { pt: "Isso mesmo! O espírito santo tornaria isso possível.", en: "That's right! Holy spirit would make it possible.", es: "¡Así es! El espíritu santo lo haría posible.", ht: "Se sa! Lespri sen t apral fè sa posib." }
            },
            { 
                q: { pt: "O que Maria disse para o anjo Gabriel?", en: "What did Mary say to the angel Gabriel?", es: "¿Qué le dijo María al ángel Gabriel?", ht: "Kisa Mari te di zanj Gabriyèl la?" },
                o: { pt: ["Eu tenho medo", "Não quero isso", "Aconteça comigo o que Jeová quiser"], en: ["I am afraid", "I don't want this", "Let it happen to me as Jehovah wants"], es: ["Tengo miedo", "No quiero esto", "Que me suceda lo que Jehová quiera"], ht: ["Mwen pè", "Mwen pa vle sa", "Se pou sa rive m jan Jewova vle a"] },
                c: 2, f: { pt: "Exato! Ela foi muito obediente.", en: "Exactly! She was very obedient.", es: "¡Exacto! Fue muy obediente.", ht: "Egzak! Li te obeyi anpil." }
            },
            { 
                q: { pt: "Quem Maria foi visitar logo depois?", en: "Who did Mary go to visit right after?", es: "¿A quién fue a visitar María poco después?", ht: "Kilès Mari t al vizite touswit apre sa?" },
                o: { pt: ["Sua parente Elisabete", "Sua mãe", "O rei Artaxerxes"], en: ["Her relative Elizabeth", "Her mother", "King Artaxerxes"], es: ["A su pariente Elisabet", "A su madre", "Al rey Artajerjes"], ht: ["Elizabèt, fanmi l", "Manman l", "Wa Atagzèsès"] },
                c: 0, f: { pt: "Correto! Elisabete também estava grávida.", en: "Correct! Elizabeth was also pregnant.", es: "¡Correcto! Elisabet también estaba embarazada.", ht: "Kòrèk! Elizabèt te ansent tou." }
            },
            { 
                q: { pt: "O que o bebê de Elisabete fez quando Maria chegou?", en: "What did Elizabeth's baby do when Mary arrived?", es: "¿Qué hizo el bebé de Elisabet cuando llegó María?", ht: "Kisa tibebe Elizabèt la te fè lè Mari rive?" },
                o: { pt: ["Ele chorou", "Ele pulou de alegria", "Ele dormiu"], en: ["He cried", "He jumped for joy", "He slept"], es: ["Lloró", "Saltó de alegría", "Se durmió"], ht: ["Li te kriye", "Li te sote ak kè kontan", "Li te dòmi"] },
                c: 1, f: { pt: "Isso! Elisabete ficou cheia de espírito santo.", en: "Yes! Elizabeth was filled with holy spirit.", es: "¡Sí! Elisabet se llenó de espíritu santo.", ht: "Wi! Elizabèt te vin ranpli ak lespri sen." }
            },
            { 
                q: { pt: "Quanto tempo Maria ficou na casa de Elisabete?", en: "How long did Mary stay at Elizabeth's house?", es: "¿Cuánto tiempo se quedó María en casa de Elisabet?", ht: "Konbe tan Mari te fè lakay Elizabèt?" },
                o: { pt: ["Uma semana", "Três meses", "Um ano"], en: ["One week", "Three months", "One year"], es: ["Una semana", "Tres meses", "Un año"], ht: ["Yon semèn", "Twa mwa", "Yon ane"] },
                c: 1, f: { pt: "Correto! Depois disso, ela voltou para Nazaré.", en: "Correct! After that, she returned to Nazareth.", es: "¡Correcto! Después de eso, volvió a Nazaret.", ht: "Kòrèk! Apre sa, li te tounen Nazarèt." }
            },
            { 
                q: { pt: "Como José soube que Maria não tinha feito nada errado?", en: "How did Joseph know Mary had done nothing wrong?", es: "¿Cómo supo José que María no había hecho nada malo?", ht: "Ki jan Jozèf te fè konnen Mari pa t fè anyen ki mal?" },
                o: { pt: ["Um anjo falou com ele num sonho", "Maria contou tudo", "Ele leu na Bíblia"], en: ["An angel spoke to him in a dream", "Mary told him everything", "He read it in the Bible"], es: ["Un ángel le habló en un sueño", "María se lo contó todo", "Lo leyó en la Biblia"], ht: ["Yon zanj te pale avè l nan yon rèv", "Mari te rakonte l tout bagay", "Li te li sa nan Labib"] },
                c: 0, f: { pt: "Isso! O anjo disse para ele não ter medo de casar com ela.", en: "Yes! The angel told him not to be afraid to marry her.", es: "¡Sí! El ángel le dijo que no tuviera miedo de casarse con ella.", ht: "Wi! Zanj lan te di l pa pè marye avè l." }
            },
            { 
                q: { pt: "Onde está escrito: 'Para Deus todas as coisas são possíveis'?", en: "Where is it written: 'With God all things are possible'?", es: "¿Dónde está escrito: 'Para Dios todas las cosas son posibles'?", ht: "Ki kote sa ekri: 'Pou Bondye tout bagay posib'?" },
                o: { pt: ["Salmo 23", "Gênesis 1", "Mateus 19:26"], en: ["Psalm 23", "Genesis 1", "Matthew 19:26"], es: ["Salmo 23", "Génesis 1", "Mateo 19:26"], ht: ["Sòm 23", "Jenèz 1", "Matye 19:26"] },
                c: 2, f: { pt: "Excelente! Jeová sempre cumpre o que promete.", en: "Excellent! Jehovah always fulfills what He promises.", es: "¡Excelente! Jehová siempre cumple lo que promete.", ht: "Ekselan! Jewova toujou fè sa l te pwomèt la." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h68').innerText = t.h68;
            document.getElementById('txt-h69').innerText = t.h69;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c68 = document.getElementById('questoes-68');
            const c69 = document.getElementById('questoes-69');
            c68.innerHTML = ''; c69.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c68.appendChild(div);
                else c69.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
