<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Histórias 72 e 73</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f7ff;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .idioma-container {
            text-align: right;
            margin-bottom: 20px;
            background: #e1f0ff;
            padding: 10px;
            border-radius: 8px;
        }
        h1, h2 {
            text-align: center;
            color: #1e5ab0;
        }
        h3 {
            color: #1e5ab0;
            border-bottom: 2px solid #cfe4ff;
            padding-bottom: 5px;
            margin-top: 30px;
        }
        .pergunta {
            background-color: #ffffff;
            border: 1px solid #caddff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .pergunta p {
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }
        label:hover { background-color: #f0f8ff; }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }
        .correto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorreto { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #btn-verificar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1e5ab0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        #btn-verificar:hover { background-color: #16468a; }
        #resultado-final {
            margin-top: 30px;
            padding: 20px;
            background-color: #e1f0ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #1e5ab0;
        }
    </style>
</head>
<body>

    <div class="idioma-container">
        <label for="select-idioma">🌐 </label>
        <select id="select-idioma" onchange="mudarIdioma()">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ht">Kreyòl Ayisyen</option>
        </select>
    </div>

    <h1 id="txt-titulo">Quiz Bíblico para Crianças</h1>
    <p id="txt-subtitulo" style="text-align: center;">Aprenda sobre Jesus e João Batista!</p>

    <div id="quiz-container">
        <h3 id="txt-h72">História 72: Jesus vai ao templo</h3>
        <div id="questoes-72"></div>

        <h3 id="txt-h73">História 73: A mensagem de João Batista</h3>
        <div id="questoes-73"></div>
    </div>

    <button id="btn-verificar" onclick="verificarRespostas()">Verificar Respostas</button>

    <div id="resultado-final"></div>

    <script>
        const uiTextos = {
            pt: { titulo: "Quiz Bíblico para Crianças", subtitulo: "Histórias 72 e 73", h72: "História 72: Jesus vai ao templo", h73: "História 73: A mensagem de João Batista", btn: "Verificar Respostas", erro: "Responda todas as perguntinhas!", fim: "Muito bem!", acertou: "Você acertou", de: "de", corretaEra: "A resposta certa era: " },
            en: { titulo: "Bible Quiz for Kids", subtitulo: "Stories 72 and 73", h72: "Story 72: Jesus Goes to the Temple", h73: "Story 73: John the Baptist's Message", btn: "Check Answers", erro: "Please answer all questions!", fim: "Great job!", acertou: "You got", de: "out of", corretaEra: "The correct answer was: " },
            es: { titulo: "Quiz Bíblico para Niños", subtitulo: "Historias 72 y 73", h72: "Historia 72: Jesús va al templo", h73: "Historia 73: El mensaje de Juan el Bautista", btn: "Verificar", erro: "¡Responde todas las preguntas!", fim: "¡Excelente!", acertou: "Acertaste", de: "de", corretaEra: "La respuesta era: " },
            ht: { titulo: "Kwiz Biblik pou Timoun", subtitulo: "Istwa 72 ak 73", h72: "Istwa 72: Jezi t al nan tanp lan", h73: "Istwa 73: Mesaj Jan Batis la", btn: "Tcheke Repons yo", erro: "Tanpri reponn tout kesyon yo!", fim: "Bon travay!", acertou: "Ou jwenn", de: "sou", corretaEra: "Bon repons lan se te: " }
        };

        const dadosQuiz = [
            // HISTÓRIA 72
            { 
                q: { pt: "Onde Jesus e sua família moravam?", en: "Where did Jesus and his family live?", es: "¿Dónde vivían Jesús y su familia?", ht: "Ki kote Jezi ak fanmi l te rete?" },
                o: { pt: ["Jerusalém", "Nazaré", "Egito"], en: ["Jerusalem", "Nazareth", "Egypt"], es: ["Jerusalén", "Nazaret", "Egipto"], ht: ["Jerizalèm", "Nazarèt", "Lejip"] },
                c: 1, f: { pt: "Isso! José e Maria moravam em Nazaré.", en: "Right! Joseph and Mary lived in Nazareth.", es: "¡Sí! José y María vivían en Nazaret.", ht: "Wi! Jozèf ak Mari te rete Nazarèt." }
            },
            { 
                q: { pt: "Qual era o trabalho de José?", en: "What was Joseph's job?", es: "¿Cuál era el trabajo de José?", ht: "Ki travay Jozèf te konn fè?" },
                o: { pt: ["Carpinteiro", "Pescador", "Sacerdote"], en: ["Carpenter", "Fisherman", "Priest"], es: ["Carpintero", "Pescador", "Sacerdote"], ht: ["Chapantye", "Pechè pwason", "Prèt"] },
                c: 0, f: { pt: "Correto! Ele trabalhava com madeira e ensinou Jesus.", en: "Correct! He worked with wood and taught Jesus.", es: "¡Correcto! Trabajaba con madera y le enseñó a Jesús.", ht: "Kòrèk! Li te konn travay bwa e li te anseye Jezi." }
            },
            { 
                q: { pt: "Para onde a família viajava todo ano para a Páscoa?", en: "Where did the family travel every year for Passover?", es: "¿A dónde viajaba la familia cada año para la Pascua?", ht: "Ki kote fanmi an te konn ale chak ane pou fèt Pak la?" },
                o: { pt: ["Belém", "Jericó", "Jerusalém"], en: ["Bethlehem", "Jericho", "Jerusalem"], es: ["Belén", "Jericó", "Jerusalén"], ht: ["Betleyèm", "Jeriko", "Jerizalèm"] },
                c: 2, f: { pt: "Exato! Era uma longa viagem para adorar a Deus.", en: "Exactly! It was a long journey to worship God.", es: "¡Exacto! Era un viaje largo para adorar a Dios.", ht: "Egzak! Se te yon vwayaj byen long pou yo t al adore Bondye." }
            },
            { 
                q: { pt: "Quantos anos Jesus tinha nessa viagem especial?", en: "How old was Jesus on this special trip?", es: "¿Cuántos años tenía Jesús en este viaje especial?", ht: "Ki laj Jezi te genyen nan vwayaj espesyal sa a?" },
                o: { pt: ["12 anos", "5 anos", "18 anos"], en: ["12 years old", "5 years old", "18 years old"], es: ["12 años", "5 años", "18 años"], ht: ["12 an", "5 an", "18 an"] },
                c: 0, f: { pt: "Isso! Ele já estava crescendo bastante.", en: "Right! He was growing up a lot.", es: "¡Sí! Ya estaba creciendo mucho.", ht: "Wi! Li te kòmanse grandi anpil." }
            },
            { 
                q: { pt: "Por quanto tempo José e Maria procuraram Jesus?", en: "How long did Joseph and Mary look for Jesus?", es: "¿Por cuánto tiempo buscaron José y María a Jesús?", ht: "Konbe tan Jozèf ak Mari te fè ap chèche Jezi?" },
                o: { pt: ["Uma hora", "Três dias", "Uma semana"], en: ["One hour", "Three days", "One week"], es: ["Una hora", "Tres días", "Una semana"], ht: ["Yon sèl lè", "Twa jou", "Yon semèn"] },
                c: 1, f: { pt: "Correto! Eles ficaram muito preocupados por três dias.", en: "Correct! They were very worried for three days.", es: "¡Correcto! Estuvieron muy preocupados por tres días.", ht: "Kòrèk! Yo te enkyè anpil pandan twa jou." }
            },
            { 
                q: { pt: "Onde encontraram Jesus no final?", en: "Where did they finally find Jesus?", es: "¿Dónde encontraron finalmente a Jesús?", ht: "Ki kote yo te jwenn Jezi finalman?" },
                o: { pt: ["No mercado", "Na casa de um amigo", "No templo"], en: ["At the market", "At a friend's house", "At the temple"], es: ["En el mercado", "En casa de un amigo", "En el templo"], ht: ["Nan mache a", "Lakay yon zanmi", "Nan tanp lan"] },
                c: 2, f: { pt: "Isso mesmo! Ele estava na casa de seu Pai.", en: "That's right! He was in his Father's house.", es: "¡Así es! Estaba en la casa de su Padre.", ht: "Se sa! Li te nan kay Papa l." }
            },
            { 
                q: { pt: "O que Jesus estava fazendo com os instrutores?", en: "What was Jesus doing with the teachers?", es: "¿Qué estaba haciendo Jesús con los maestros?", ht: "Kisa Jezi t ap fè ak moun ki t ap anseye yo?" },
                o: { pt: ["Brincando", "Ouvindo e fazendo perguntas", "Dormindo"], en: ["Playing", "Listening and asking questions", "Sleeping"], es: ["Jugando", "Escuchando y haciendo preguntas", "Durmiendo"], ht: ["L t ap jwe", "L t ap koute e l t ap poze keksyon", "L t ap dòmi"] },
                c: 1, f: { pt: "Exato! Ele amava aprender sobre Jeová.", en: "Exactly! He loved learning about Jehovah.", es: "¡Exacto! Le encantaba aprender sobre Jehová.", ht: "Egzak! Li te renmen aprann sou Jewova." }
            },
            { 
                q: { pt: "Como os instrutores se sentiram com Jesus?", en: "How did the teachers feel about Jesus?", es: "¿Cómo se sintieron los maestros con Jesús?", ht: "Ki jan moun ki t ap anseye yo te santi yo devan Jezi?" },
                o: { pt: ["Ficaram bravos", "Ficaram impressionados", "Não deram atenção"], en: ["They were angry", "They were impressed", "They didn't pay attention"], es: ["Se enojaron", "Se quedaron impresionados", "No prestaron atención"], ht: ["Yo te fache", "Yo te sezi anpil", "Yo pa t okipe l"] },
                c: 1, f: { pt: "Certo! Eles gostaram muito das respostas dele.", en: "Right! They really liked his answers.", es: "¡Bien! Les gustaron mucho sus respuestas.", ht: "Wi! Yo te renmen repons li yo anpil." }
            },
            { 
                q: { pt: "O que Jesus respondeu quando Maria o encontrou?", en: "What did Jesus answer when Mary found him?", es: "¿Qué respondió Jesús cuando María lo encontró?", ht: "Kisa Jezi te reponn lè Mari te jwenn li?" },
                o: { pt: ["Eu me perdi", "Eu estava aqui, na casa do meu Pai", "Eu queria ficar sozinho"], en: ["I got lost", "I was here, in my Father's house", "I wanted to be alone"], es: ["Me perdí", "Estaba aquí, en la casa de mi Padre", "Quería estar solo"], ht: ["Mwen te pèdi", "Mwen te isit la, nan kay Papa m nan", "Mwen te vle rete pou kont mwen"] },
                c: 1, f: { pt: "Isso! Ele sabia que o templo era um lugar especial.", en: "Yes! He knew the temple was a special place.", es: "¡Sí! Sabía que el templo era un lugar especial.", ht: "Wi! Li te konnen tanp lan se te yon kote espesyal." }
            },
            { 
                q: { pt: "O que aconteceu quando Jesus cresceu?", en: "What happened as Jesus grew up?", es: "¿Qué pasó mientras Jesús crecía?", ht: "Kisa k te rive pandan Jezi t ap grandi?" },
                o: { pt: ["Ficou mais inteligente e Jeová ficou feliz", "Ele esqueceu as leis", "Ele fugiu de casa"], en: ["He grew smarter and Jehovah was happy", "He forgot the laws", "He ran away from home"], es: ["Se hizo más sabio y Jehová estaba feliz", "Se olvidó de las leyes", "Huyó de casa"], ht: ["Li te vin gen plis sajès e Jewova te kontan", "Li te bliye lwa yo", "Li te kouri kite kay li"] },
                c: 0, f: { pt: "Perfeito! As pessoas gostavam cada vez mais dele.", en: "Perfect! People liked him more and more.", es: "¡Perfecto! A la gente le gustaba cada vez más.", ht: "Pafè! Moun yo te renmen l de plis an plis." }
            },

            // HISTÓRIA 73
            { 
                q: { pt: "Quem eram os pais de João Batista?", en: "Who were John the Baptist's parents?", es: "¿Quiénes eran los padres de Juan el Bautista?", ht: "Kilès ki te paran Jan Batis?" },
                o: { pt: ["José e Maria", "Zacarias e Elisabete", "Davi e Rute"], en: ["Joseph and Mary", "Zechariah and Elizabeth", "David and Ruth"], es: ["José y María", "Zacarías y Elisabet", "David y Rut"], ht: ["Jozèf ak Mari", "Zakari ak Elizabèt", "David ak Rit"] },
                c: 1, f: { pt: "Correto! Ele nasceu quando eles já eram idosos.", en: "Correct! He was born when they were already old.", es: "¡Correcto! Nació cuando ellos ya eran mayores.", ht: "Kòrèk! Li te fèt lè yo te granmoun deja." }
            },
            { 
                q: { pt: "Qual era o trabalho especial de João?", en: "What was John's special job?", es: "¿Cuál era el trabajo especial de Juan?", ht: "Ki travay espesyal Jan te genyen?" },
                o: { pt: ["Construir casas", "Dizer que o Messias estava chegando", "Ser um soldado"], en: ["To build houses", "To say the Messiah was coming", "To be a soldier"], es: ["Construir casas", "Decir que el Mesías estaba llegando", "Ser un soldado"], ht: ["Bati kay", "Di Mesi a ap vini", "Yon sòlda"] },
                c: 1, f: { pt: "Isso! Jeová escolheu João para preparar o caminho.", en: "Yes! Jehovah chose John to prepare the way.", es: "¡Sí! Jehová eligió a Juan para preparar el camino.", ht: "Wi! Jewova te chwazi Jan pou l prepare chemen an." }
            },
            { 
                q: { pt: "Onde João ensinava as pessoas?", en: "Where did John teach the people?", es: "¿Dónde enseñaba Juan a la gente?", ht: "Ki kote Jan te konn anseye moun yo?" },
                o: { pt: ["Longe das cidades", "Dentro do palácio", "Nas escolas"], en: ["Far from the cities", "Inside the palace", "In schools"], es: ["Lejos de las ciudades", "Dentro del palacio", "En las escuelas"], ht: ["Lwen vil yo", "Anndan palè a", "Nan lekòl yo"] },
                c: 0, f: { pt: "Exato! Ele ensinava em lugares simples, longe da cidade.", en: "Exactly! He taught in simple places, far from the city.", es: "¡Exacto! Enseñaba en lugares sencillos, lejos de la ciudad.", ht: "Egzak! Li te konn anseye kote ki senp, lwen vil yo." }
            },
            { 
                q: { pt: "De que era feita a roupa de João?", en: "What were John's clothes made of?", es: "¿De qué estaba hecha la ropa de Juan?", ht: "Ak kisa rad Jan te fèt?" },
                o: { pt: ["Seda fina", "Pelo de camelo", "Pele de ovelha"], en: ["Fine silk", "Camel hair", "Sheepskin"], es: ["Seda fina", "Pelo de camello", "Piel de oveja"], ht: ["Swa", "Plim chamo", "Po mouton"] },
                c: 1, f: { pt: "Certo! Ele levava uma vida muito simples.", en: "Right! He led a very simple life.", es: "¡Bien! Llevaba una vida muy sencilla.", ht: "Wi! Li te mennen yon vi ki senp anpil." }
            },
            { 
                q: { pt: "O que João comia no deserto?", en: "What did John eat in the desert?", es: "¿Qué comía Juan en el desierto?", ht: "Kisa Jan te konn manje nan dezè a?" },
                o: { pt: ["Pão e frutas", "Peixe frito", "Gafanhotos e mel"], en: ["Bread and fruit", "Fried fish", "Locusts and honey"], es: ["Pan y frutas", "Pescado frito", "Langostas y miel"], ht: ["Pen ak fwi", "Pwason fri", "Krikèt ak siwo myèl"] },
                c: 2, f: { pt: "Isso! Era o que ele encontrava na natureza.", en: "Yes! It was what he found in nature.", es: "¡Sí! Era lo que encontraba en la naturaleza.", ht: "Wi! Se sa li te jwenn nan lanati a." }
            },
            { 
                q: { pt: "O que as pessoas faziam depois de se arrepender?", en: "What did people do after repenting?", es: "¿Qué hacía la gente después de arrepentirse?", ht: "Kisa moun yo te fè apre yo fin repanti?" },
                o: { pt: ["Eram batizados por João", "Davam dinheiro para João", "Iam morar no deserto"], en: ["They were baptized by John", "They gave money to John", "They went to live in the desert"], es: ["Eran bautizados por Juan", "Le daban dinero a Juan", "Se iban a vivir al desierto"], ht: ["Jan te batize yo", "Yo te bay Jan lajan", "Y al rete nan dezè a"] },
                c: 0, f: { pt: "Correto! O batismo mostrava que queriam mudar.", en: "Correct! Baptism showed they wanted to change.", es: "¡Correcto! El bautismo mostraba que querían cambiar.", ht: "Kòrèk! Batèm nan te montre yo te vle chanje." }
            },
            { 
                q: { pt: "O que João disse para quem tinha duas roupas?", en: "What did John say to those who had two sets of clothes?", es: "¿Qué les dijo Juan a los que tenían dos mudas de ropa?", ht: "Kisa Jan te di moun ki te gen de rad yo?" },
                o: { pt: ["Venda uma delas", "Guarde para o futuro", "Deem uma para quem não tem"], en: ["Sell one of them", "Save it for the future", "Give one to those who have none"], es: ["Vendan una", "Guárdenla para el futuro", "Denle una al que no tiene"], ht: ["Vann youn", "Sere l pou pita", "Bay moun ki pa genyen an youn"] },
                c: 2, f: { pt: "Isso! Ele ensinou que temos que amar e ajudar as pessoas.", en: "Yes! He taught that we must love and help people.", es: "¡Sí! Enseñó que debemos amar y ayudar a las personas.", ht: "Wi! Li te montre nou dwe renmen ak ede moun." }
            },
            { 
                q: { pt: "O que João falou para os cobradores de impostos?", en: "What did John tell the tax collectors?", es: "¿Qué les dijo Juan a los cobradores de impuestos?", ht: "Kisa Jan te di pèseptè yo?" },
                o: { pt: ["Não trabalhem mais", "Sejam honestos e não enganem ninguém", "Cobrem mais caro"], en: ["Stop working", "Be honest and don't cheat anyone", "Charge more"], es: ["No trabajen más", "Sean honrados y no engañen a nadie", "Cobren más caro"], ht: ["Sispann travay", "Se pou n onèt e piga n twonpe pèsonn", "Mande plis lajan"] },
                c: 1, f: { pt: "Certo! Honestidade é muito importante para Jeová.", en: "Right! Honesty is very important to Jehovah.", es: "¡Bien! La honradez es muy importante para Jehová.", ht: "Wi! Jewova bay onètete anpil enpòtans." }
            },
            { 
                q: { pt: "João disse que alguém mais importante estava chegando. Quem era?", en: "John said someone more important was coming. Who was it?", es: "Juan dijo que alguien más importante estaba por llegar. ¿Quién era?", ht: "Jan te di yon moun ki pi enpòtan t apral vini. Kilès sa te ye?" },
                o: { pt: ["Um novo rei", "O Messias (Jesus)", "Um anjo"], en: ["A new king", "The Messiah (Jesus)", "An angel"], es: ["Un nuevo rey", "El Mesías (Jesús)", "Un ángel"], ht: ["Yon lòt wa", "Mesi a (Jezi)", "Yon zanj"] },
                c: 1, f: { pt: "Isso mesmo! João disse que não merecia nem tirar as sandálias dele.", en: "Exactly! John said he wasn't worthy to untie his sandals.", es: "¡Exacto! Juan dijo que no era digno de quitarle las sandalias.", ht: "Egzak! Jan te di li pa t menm merite retire sapat nan pye l." }
            },
            { 
                q: { pt: "Com o que o Messias iria batizar as pessoas?", en: "What would the Messiah baptize people with?", es: "¿Con qué bautizaría el Mesías a la gente?", ht: "Ak kisa Mesi a t apral batize moun yo?" },
                o: { pt: ["Com água", "Com espírito santo", "Com mel"], en: ["With water", "With holy spirit", "With honey"], es: ["Con agua", "Con espíritu santo", "Con miel"], ht: ["Ak dlo", "Ak lespri sen", "Ak siwo myèl"] },
                c: 1, f: { pt: "Excelente! João batizava com água, mas o Messias seria especial.", en: "Excellent! John baptized with water, but the Messiah would be special.", es: "¡Excelente! Juan bautizaba con agua, pero el Mesías sería especial.", ht: "Ekselan! Jan te batize ak dlo, men Mesi a t ap espesyal." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h72').innerText = t.h72;
            document.getElementById('txt-h73').innerText = t.h73;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c72 = document.getElementById('questoes-72');
            const c73 = document.getElementById('questoes-73');
            c72.innerHTML = ''; c73.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c72.appendChild(div);
                else c73.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
