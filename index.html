                q: { pt: "Como Jesus era de temperamento?", en: "What was Jesus' temperament like?", es: "¿Cómo era el temperamento de Jesús?", ht: "Ki jan tanperaman Jezi te ye?" },
                o: { pt: ["Brando e humilde de coração", "Bravo e impaciente", "Orgulhoso e rico"], en: ["Mild and lowly in heart", "Angry and impatient", "Proud and rich"], es: ["Apacible y humilde de corazón", "Enojado e impaciente", "Orgulloso y rico"], ht: ["Dou e li gen imilite nan kè l", "Fache e li pa gen pasyans", "Ògeye e li rich"] },
                c: 0, f: { pt: "Excelente! Jesus era brando e humilde de coração[cite: 99].", en: "Excellent! Jesus was mild and lowly in heart[cite: 99].", es: "¡Excelente! Jesús era apacible y humilde de corazón[cite: 99].", ht: "Ekselan! Jezi te dou e li te gen imilite nan kè l[cite: 99]." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h80').innerText = t.h80;
            document.getElementById('txt-h81').innerText = t.h81;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c80 = document.getElementById('questoes-80');
            const c81 = document.getElementById('questoes-81');
            c80.innerHTML = ''; c81.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c80.appendChild(div);
                else c81.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
