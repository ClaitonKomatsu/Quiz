            { 
                q: { pt: "Para onde os discípulos voltaram depois que Jesus subiu ao céu?", en: "Where did the disciples return to after Jesus ascended to heaven?", es: "¿A dónde regresaron los discípulos después de que Jesús ascendió al cielo?", ht: "Ki kote disip yo te tounen apre Jezi fin moute nan syèl la?" },
                o: { pt: ["Para Roma", "Para Jerusalém", "De volta para o Egito"], en: ["To Rome", "To Jerusalem", "Back to Egypt"], es: ["A Roma", "A Jerusalén", "De vuelta a Egipto"], ht: ["Wòm", "Nan Jerizalèm", "Tounen Lejip"] },
                c: 1, f: { pt: "Correto! Eles saíram do monte das Oliveiras e foram para Jerusalém obedecendo a Jesus.", en: "Correct! They left the Mount of Olives and went to Jerusalem, obeying Jesus.", es: "¡Correcto! Salieron del monte de los Olivos y fueron a Jerusalén, obedeciendo a Jesús.", ht: "Kòrèk! Yo te kite mòn Olivet epi yo tounen Jerizalèm jan Jezi te di yo a." }
            },
            { 
                q: { pt: "O que os discípulos faziam sempre quando se reuniam em Jerusalém?", en: "What did the disciples always do when they gathered in Jerusalem?", es: "¿Qué hacían siempre los discípulos quando se reunían en Jerusalén?", ht: "Kisa disip yo te konn fè chak fwa yo reyini Jerizalèm?" },
                o: { pt: ["Dormiam o dia todo", "Sempre se reuniam e oravam, aguardando instruções", "Lutavam contra os fariseus"], en: ["Slept all day", "Always gathered and prayed, awaiting instructions", "Fought against the Pharisees"], es: ["Dormían todo el día", "Siempre se reunían y oraban, esperando instrucciones", "Luchaban contra los fariseos"], ht: ["Yo t ap dòmi tout jounen an", "Yo te toujou reyini epi yo priye, y ap tann lòd", "Yo t ap goumen ak farizyen yo"] },
                c: 1, f: { pt: "Excelente! Eles mantiveram a união e a forte fé por meio da oração.", en: "Excellent! They maintained unity and strong faith through prayer.", es: "¡Excelente! Mantuvieron la unidad y una fe fuerte por medio de la oración.", ht: "Ekselan! Yo te rete ak yon bèl inite epi yon lafwa solid nan priyè." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h92').innerText = t.h92;
            document.getElementById('txt-h93').innerText = t.h93;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c92 = document.getElementById('questoes-92');
            const c93 = document.getElementById('questoes-93');
            c92.innerHTML = ''; c93.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c92.appendChild(div);
                else c93.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
