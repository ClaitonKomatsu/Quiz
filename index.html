<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Celebração da Morte de Jesus</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f7ff;
            color: #333;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .idioma-container {
            text-align: right;
            margin-bottom: 20px;
            background: #e1f0ff;
            padding: 10px;
            border-radius: 8px;
        }
        h1, h2 {
            text-align: center;
            color: #1e5ab0;
        }
        h3 {
            color: #1e5ab0;
            border-bottom: 2px solid #cfe4ff;
            padding-bottom: 5px;
            margin-top: 30px;
        }
        .pergunta {
            background-color: #ffffff;
            border: 1px solid #caddff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .pergunta p {
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }
        label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
        }
        label:hover { background-color: #f0f8ff; }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }
        .correto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorreto { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #btn-verificar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1e5ab0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        #btn-verificar:hover { background-color: #16468a; }
        #resultado-final {
            margin-top: 30px;
            padding: 20px;
            background-color: #e1f0ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #1e5ab0;
        }
    </style>
</head>
<body>

    <div class="idioma-container">
        <label for="select-idioma">🌐 </label>
        <select id="select-idioma" onchange="mudarIdioma()">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ht">Kreyòl Ayisyen</option>
        </select>
    </div>

    <h1 id="txt-titulo">Quiz Bíblico para Crianças</h1>
    <p id="txt-subtitulo" style="text-align: center;">O dia mais importante do ano!</p>

    <div id="quiz-container">
        <h3 id="txt-h74">A Celebração da Morte de Jesus</h3>
        <div id="questoes-gerais"></div>
    </div>

    <button id="btn-verificar" onclick="verificarRespostas()">Verificar Respostas</button>

    <div id="resultado-final"></div>

    <script>
        const uiTextos = {
            pt: { titulo: "Quiz Bíblico para Crianças", subtitulo: "Aprenda sobre o Memorial", h74: "Celebração da Morte de Jesus", btn: "Verificar Respostas", erro: "Responda todas as perguntinhas!", fim: "Muito bem!", acertou: "Você acertou", de: "de", corretaEra: "A resposta certa era: " },
            en: { titulo: "Bible Quiz for Kids", subtitulo: "Learn about the Memorial", h74: "Memorial of Jesus' Death", btn: "Check Answers", erro: "Please answer all questions!", fim: "Great job!", acertou: "You got", de: "out of", corretaEra: "The correct answer was: " },
            es: { titulo: "Quiz Bíblico para Niños", subtitulo: "Aprende sobre la Conmemoración", h74: "Conmemoración de la muerte de Jesús", btn: "Verificar", erro: "¡Responde todas las preguntas!", fim: "¡Excelente!", acertou: "Acertaste", de: "de", corretaEra: "La respuesta era: " },
            ht: { titulo: "Kwiz Biblik pou Timoun", subtitulo: "Aprann sou Memoryal la", h74: "Memoryal lanmò Jezi", btn: "Tcheke Repons yo", erro: "Tanpri reponn tout kesyon yo!", fim: "Bon travay!", acertou: "Ou jwenn", de: "sou", corretaEra: "Bon repons lan se te: " }
        };

        const dadosQuiz = [
            { 
                q: { pt: "Por que celebramos a morte de Jesus?", en: "Why do we celebrate Jesus' death?", es: "¿Por qué conmemoramos la muerte de Jesús?", ht: "Poukisa nou fete lanmò Jezi?" },
                o: { pt: ["Para ganhar presentes", "Para lembrar que Jesus deu a vida por nós", "Porque é um feriado comum"], en: ["To get presents", "To remember Jesus gave his life for us", "Because it's a common holiday"], es: ["Para recibir regalos", "Para recordar que Jesús dio su vida por nosotros", "Porque es un día festivo común"], ht: ["Pou nou jwenn kado", "Pou nou sonje Jezi te bay lavi l pou nou", "Paske se yon jou konje nòmal"] },
                c: 1, f: { pt: "Isso! Jesus pediu para lembrarmos do seu sacrifício.", en: "Right! Jesus asked us to remember his sacrifice.", es: "¡Bien! Jesús nos pidió que recordáramos su sacrificio.", ht: "Wi! Jezi te mande pou nou sonje sakrifis li a." }
            },
            { 
                q: { pt: "Quem começou essa celebração?", en: "Who started this celebration?", es: "¿Quién empezó esta celebración?", ht: "Kilès ki te kòmanse fèt sa a?" },
                o: { pt: ["O próprio Jesus", "Os anjos", "O rei Herodes"], en: ["Jesus himself", "The angels", "King Herod"], es: ["El propio Jesús", "Los ángeles", "El rey Herodes"], ht: ["Jezi li menm", "Zanj yo", "Wa Ewòd"] },
                c: 0, f: { pt: "Exato! Ele fez isso na noite antes de morrer.", en: "Exactly! He did this the night before he died.", es: "¡Exacto! Lo hizo la noche antes de morir.", ht: "Egzak! Li te fè sa nan nwit anvan l mouri a." }
            },
            { 
                q: { pt: "Quais são os dois símbolos usados no Memorial?", en: "What are the two symbols used at the Memorial?", es: "¿Cuáles son los dos símbolos que se usan?", ht: "Ki de senbòl yo sèvi nan Memoryal la?" },
                o: { pt: ["Água e suco", "Pão e vinho", "Frutas e pão"], en: ["Water and juice", "Bread and wine", "Fruit and bread"], es: ["Agua y jugo", "Pan y vino", "Fruta y pan"], ht: ["Dlo ak ji", "Pen ak diven", "Fwi ak pen"] },
                c: 1, f: { pt: "Correto! O pão e o vinho representam coisas importantes.", en: "Correct! The bread and wine represent important things.", es: "¡Correcto! El pan y el vino representan cosas importantes.", ht: "Kòrèk! Pen an ak diven an reprezante bagay ki enpòtan." }
            },
            { 
                q: { pt: "O que o pão representa?", en: "What does the bread represent?", es: "¿Qué representa el pan?", ht: "Kisa pen an reprezante?" },
                o: { pt: ["A Terra inteira", "As leis de Deus", "O corpo perfeito de Jesus"], en: ["The whole Earth", "God's laws", "Jesus' perfect body"], es: ["Toda la Tierra", "Las leyes de Dios", "El cuerpo perfecto de Jesús"], ht: ["Tout tè a", "Lwa Bondye yo", "Kò pafè Jezi a"] },
                c: 2, f: { pt: "Isso! O pão sem fermento lembra o corpo de Jesus.", en: "Yes! Unleavened bread reminds us of Jesus' body.", es: "¡Sí! El pan sin levadura recuerda el cuerpo de Jesús.", ht: "Wi! Pen san ledven an fè nou sonje kò Jezi." }
            },
            { 
                q: { pt: "O que o vinho representa?", en: "What does the wine represent?", es: "¿Qué representa el vino?", ht: "Kisa diven an reprezante?" },
                o: { pt: ["O sangue de Jesus", "A água do batismo", "O mel que João comia"], en: ["Jesus' blood", "Baptism water", "The honey John ate"], es: ["La sangre de Jesús", "El agua del bautismo", "La miel que comía Juan"], ht: ["San Jezi", "Dlo batèm nan", "Siwo myèl Jan te konn manje a"] },
                c: 0, f: { pt: "Certo! O vinho tinto lembra o sangue que Jesus derramou.", en: "Right! Red wine reminds us of the blood Jesus shed.", es: "¡Bien! El vino tinto recuerda la sangre que Jesús derramó.", ht: "Wi! Diven wouj la fè nou sonje san Jezi te koule a." }
            },
            { 
                q: { pt: "Como deve ser o pão do Memorial?", en: "What should the Memorial bread be like?", es: "¿Cómo debe ser el pan de la Conmemoración?", ht: "Ki jan pen Memoryal la dwe ye?" },
                o: { pt: ["Com muito açúcar", "Com fermento", "Sem fermento"], en: ["With lots of sugar", "With yeast", "Unleavened (no yeast)"], es: ["Con mucha azúcar", "Con levadura", "Sin levadura"], ht: ["Ak anpil sik", "Ak ledven", "San ledven"] },
                c: 2, f: { pt: "Exato! Sem fermento significa puro, como Jesus.", en: "Exactly! Without yeast means pure, like Jesus.", es: "¡Exacto! Sin levadura significa puro, como Jesús.", ht: "Egzak! San ledven vle di li pwòp, menm jan ak Jezi." }
            },
            { 
                q: { pt: "Quantas vezes por ano celebramos o Memorial?", en: "How many times a year do we celebrate the Memorial?", es: "¿Cuántas veces al año celebramos la Conmemoración?", ht: "Konbe fwa pa ane nou fete Memoryal la?" },
                o: { pt: ["Uma vez por ano", "Todos os meses", "Toda semana"], en: ["Once a year", "Every month", "Every week"], es: ["Una vez al año", "Todos los meses", "Cada semana"], ht: ["Yon fwa pa ane", "Chak mwa", "Chak semèn"] },
                c: 0, f: { pt: "Isso! Fazemos no mesmo dia em que Jesus morreu (14 de nisã).", en: "Right! We do it on the same day Jesus died (Nisan 14).", es: "¡Bien! Lo hacemos el mismo día que murió Jesús (14 de nisán).", ht: "Wi! Nou fè l menm jou Jezi te mouri a (14 nizan)." }
            },
            { 
                q: { pt: "O que Jesus disse ao dar o pão e o vinho?", en: "What did Jesus say when giving the bread and wine?", es: "¿Qué dijo Jesús al dar el pan y el vino?", ht: "Kisa Jezi te di lè l t ap bay pen an ak diven an?" },
                o: { pt: ["'Não esqueçam de comer'", "'Persistam em fazer isso em memória de mim'", "'Isso é apenas um lanche'"], en: ["'Don't forget to eat'", "'Keep doing this in remembrance of me'", "'This is just a snack'"], es: ["'No olviden comer'", "'Sigan haciendo esto en memoria de mí'", "'Esto es solo una merienda'"], ht: ["'Pa bliye manje'", "'Kontinye fè sa pou nou sonje m'", "'Sa se yon ti goute sèlman'"] },
                c: 1, f: { pt: "Perfeito! Essas palavras estão em Lucas 22:19.", en: "Perfect! These words are in Luke 22:19.", es: "¡Perfecto! Esas palabras están en Lucas 22:19.", ht: "Pafè! Pawòl sa yo nan Lik 22:19." }
            },
            { 
                q: { pt: "Quem pode participar (comer e beber) dos símbolos?", en: "Who partakes of (eats and drinks) the symbols?", es: "¿Quiénes participan de los símbolos?", ht: "Kilès ki pran nan senbòl yo (manje ak bwè)?" },
                o: { pt: ["Todo mundo que vai", "Apenas os que vão para o céu (ungidos)", "Só as crianças"], en: ["Everyone who attends", "Only those going to heaven (anointed)", "Only children"], es: ["Todos los que asisten", "Solo los que van al cielo (ungidos)", "Solo los niños"], ht: ["Tout moun ki vini yo", "Moun ki pral nan syèl yo sèlman (wen yo)", "Timoun yo sèlman"] },
                c: 1, f: { pt: "Correto! A maioria das pessoas assiste com respeito como observadores.", en: "Correct! Most people attend respectfully as observers.", es: "¡Correcto! La mayoría asiste con respeto como observadores.", ht: "Kòrèk! Pifò moun asiste ak respè kòm moun k ap gade." }
            },
            { 
                q: { pt: "Por que as outras pessoas não comem do pão?", en: "Why don't the other people eat the bread?", es: "¿Por qué las otras personas no comen del pan?", ht: "Poukisa lòt moun yo pa manje nan pen an?" },
                o: { pt: ["Porque não gostam do sabor", "Porque sua esperança é viver para sempre na Terra", "Porque chegaram atrasadas"], en: ["Because they don't like the taste", "Because their hope is to live forever on Earth", "Because they arrived late"], es: ["Porque no les gusta el sabor", "Porque su esperanza es vivir para siempre en la Tierra", "Porque llegaron tarde"], ht: ["Paske yo pa renmen gou a", "Paske espwa yo se viv pou toutan sou tè a", "Paske yo rive anreta"] },
                c: 1, f: { pt: "Isso! Elas mostram gratidão por Jesus tornar possível a vida na Terra.", en: "Yes! They show gratitude for Jesus making life on Earth possible.", es: "¡Sí! Muestran gratitud porque Jesús hace posible la vida en la Tierra.", ht: "Wi! Yo montre yo rekonesan paske Jezi fè l posib pou moun viv sou tè a." }
            },
            { 
                q: { pt: "Onde Jesus estava na primeira Celebração?", en: "Where was Jesus during the first Celebration?", es: "¿Dónde estaba Jesús en la primera Conmemoración?", ht: "Ki kote Jezi te ye nan premye Memoryal la?" },
                o: { pt: ["No templo", "Num quarto no andar de cima", "Num barco"], en: ["In the temple", "In an upper room", "On a boat"], es: ["En el templo", "En un cuarto en el piso de arriba", "En un barco"], ht: ["Nan tanp lan", "Nan yon chanm anlè", "Sou yon bato"] },
                c: 1, f: { pt: "Exato! Ele estava com seus 12 apóstolos.", en: "Exactly! He was with his 12 apostles.", es: "¡Exacto! Estaba con sus 12 apóstoles.", ht: "Egzak! Li te ak 12 apot li yo." }
            },
            { 
                q: { pt: "Qual é o nome da data no calendário bíblico?", en: "What is the date on the Bible calendar?", es: "¿Cuál es la fecha en el calendario bíblico?", ht: "Ki dat li ye nan kalandriye biblik la?" },
                o: { pt: ["1º de Janeiro", "14 de Nisã", "25 de Dezembro"], en: ["January 1st", "Nisan 14", "December 25th"], es: ["1 de enero", "14 de nisán", "25 de diciembre"], ht: ["1ye janvye", "14 nizan", "25 desanm"] },
                c: 1, f: { pt: "Correto! É um dia que muda no nosso calendário todo ano.", en: "Correct! It's a day that changes on our calendar every year.", es: "¡Correcto! Es un día que cambia en nuestro calendario cada año.", ht: "Kòrèk! Se yon jou ki chanje nan kalandriye pa nou an chak ane." }
            },
            { 
                q: { pt: "O que acontece em uma reunião do Memorial?", en: "What happens at a Memorial meeting?", es: "¿Qué pasa en una reunión de la Conmemoración?", ht: "Kisa k pase nan yon reyinyon Memoryal?" },
                o: { pt: ["Uma festa com música alta", "Um discurso que explica a Bíblia", "Uma gincana"], en: ["A party with loud music", "A talk explaining the Bible", "A scavenger hunt"], es: ["Una fiesta con música fuerte", "Un discurso que explica la Biblia", "Un juego de pistas"], ht: ["Yon fèt ak mizik fò", "Yon diskou ki esplike Labib", "Yon konpetisyon jwèt"] },
                c: 1, f: { pt: "Isso! O discurso nos ajuda a entender o amor de Jeová.", en: "Right! The talk helps us understand Jehovah's love.", es: "¡Bien! El discurso nos ayuda a entender el amor de Jehová.", ht: "Wi! Diskou a ede nou konprann lanmou Jewova." }
            },
            { 
                q: { pt: "Por que o Memorial é o dia mais importante do ano?", en: "Why is the Memorial the most important day of the year?", es: "¿Por qué es el día más importante del año?", ht: "Poukisa Memoryal la se jou ki pi enpòtan nan ane a?" },
                o: { pt: ["Porque mostra o grande amor de Jeová e Jesus por nós", "Porque não temos escola", "Porque comemos pão diferente"], en: ["Because it shows Jehovah and Jesus' great love for us", "Because there is no school", "Because we eat different bread"], es: ["Porque muestra el gran amor de Jehová y Jesús por nosotros", "Porque no hay escuela", "Porque comemos un pan diferente"], ht: ["Paske sa montre gwo lanmou Jewova ak Jezi gen pou nou", "Paske nou pa al lekòl", "Paske nou manje yon pen ki diferan"] },
                c: 0, f: { pt: "Certo! Sem o sacrifício de Jesus, não teríamos esperança.", en: "Right! Without Jesus' sacrifice, we would have no hope.", es: "¡Bien! Sin el sacrificio de Jesús, no tendríamos esperanza.", ht: "Wi! San sakrifis Jezi a, nou pa t ap gen espwa." }
            },
            { 
                q: { pt: "O que as crianças podem fazer para se preparar?", en: "What can children do to prepare?", es: "¿Qué pueden hacer los niños para prepararse?", ht: "Kisa timoun yo ka fè pou yo prepare yo?" },
                o: { pt: ["Dormir cedo", "Ler as histórias da Bíblia sobre os últimos dias de Jesus", "Comprar roupas de super-herói"], en: ["Go to sleep early", "Read Bible stories about Jesus' final days", "Buy superhero clothes"], es: ["Dormir temprano", "Leer las historias bíblicas sobre los últimos días de Jesús", "Comprar ropa de superhéroe"], ht: ["Dòmi bonè", "Li istwa nan Bib la sou dènye jou Jezi yo", "Achte rad sipè-erò"] },
                c: 1, f: { pt: "Excelente! Ler a Bíblia nos ajuda a preparar o coração.", en: "Excellent! Reading the Bible helps us prepare our hearts.", es: "¡Excelente! Leer la Biblia nos ayuda a preparar el corazón.", ht: "Ekselan! Lè nou li Labib, sa ede nou prepare kè nou." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h74').innerText = t.h74;
            document.getElementById('btn-verificar').innerText = t.btn;

            const conteiner = document.getElementById('questoes-gerais');
            conteiner.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                conteiner.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
