            { 
                q: { pt: "O que Jesus provou mesmo quando ficou totalmente sozinho naquela noite?", en: "What did Jesus prove even when he was left completely alone that night?", es: "¿Qué demostró Jesús aun cuando se quedó totalmente solo esa noche?", ht: "Kisa Jezi te montre menm lè l te rete pou kont li nan nuit sa a?" },
                o: { pt: ["Que ele tinha medo dos inimigos", "Que Jeová, o Pai dele, estava com ele", "Que ele queria desistir de tudo"], en: ["That he was afraid of the enemies", "That Jehovah, his Father, was with him", "That he wanted to give up everything"], es: ["Que tenía miedo a los enemigos", "Que Jehová, su Padre, estaba con él", "Que quería rendirse de todo"], ht: ["Li te pè ènmi yo", "Jewova, Papa l, te avè l", "Li te vle abandone tout bagay"] },
                c: 1, f: { pt: "Excelente! João 16:32 mostra que Jesus sabia que seu Pai nunca o deixaria só.", en: "Excellent! John 16:32 shows that Jesus knew his Father would never leave him alone.", es: "¡Excelente! Juan 16:32 muestra que Jesús sabía que su Padre nunca lo dejaría solo.", ht: "Ekselan! Jan 16:32 montre Jezi te konnen Papa l pa t ap janm lage l pou kont li." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h88').innerText = t.h88;
            document.getElementById('txt-h89').innerText = t.h89;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c88 = document.getElementById('questoes-88');
            const c89 = document.getElementById('questoes-89');
            c88.innerHTML = ''; c89.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c88.appendChild(div);
                else c89.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
