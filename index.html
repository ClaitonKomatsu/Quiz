                q: { pt: "O que a Bíblia diz sobre o Diabo em João 8:44?", en: "What does the Bible say about the Devil in John 8:44?", es: "¿Qué dice la Biblia sobre el Diablo en Juan 8:44?", ht: "Kisa Labib di sou Dyab la nan Jan 8:44?" },
                o: { pt: ["Que ele é o pai da mentira.", "Que ele é muito forte.", "Que ele mora no deserto."], en: ["That he is the father of the lie.", "That he is very strong.", "That he lives in the desert."], es: ["Que es el padre de la mentira.", "Que es muy fuerte.", "Que vive en el desierto."], ht: ["Se papa manti li ye.", "Li fò anpil.", "Li rete nan dezè a."] },
                c: 0, f: { pt: "Perfeito! Ele é um mentiroso e o pai da mentira[cite: 178, 179].", en: "Perfect! He is a liar and the father of the lie[cite: 178, 179].", es: "¡Perfecto! Es un mentiroso y el padre de la mentira[cite: 178, 179].", ht: "Pafè! Li se yon mantò e se papa manti li ye[cite: 178, 179]." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h74').innerText = t.h74;
            document.getElementById('txt-h75').innerText = t.h75;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c74 = document.getElementById('questoes-74');
            const c75 = document.getElementById('questoes-75');
            c74.innerHTML = ''; c75.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c74.appendChild(div);
                else c75.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
</html>
