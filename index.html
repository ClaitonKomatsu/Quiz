                q: { pt: "Em que momento exato os dois discípulos no caminho finalmente reconheceram Jesus?", en: "At what exact moment did the two disciples on the way finally recognize Jesus?", es: "¿En qué momento exacto reconocieron por fin a Jesús los dos discípulos en el camino?", ht: "Ki lè egzakteman de disip yo te rive rekonèt Jezi?" },
                o: { pt: ["Quando ele fez uma oração antes de comer o pão", "Quando ele tirou o manto", "Logo quando ele começou a andar"], en: ["When he said a prayer before eating the bread", "When he took off his cloak", "Right when he started walking"], es: ["Cuando hizo una oración antes de comer el pan", "Cuando se quitó el manto", "Justo cuando empezó a caminar"], ht: ["Lè l te fè yon priyè anvan yo manje pen an", "Lè l te wete gwo rad li a", "Touts wit lè l te kòmanse mache a"] },
                c: 0, f: { pt: "Isso mesmo! Logo depois de reconhecerem, ele desapareceu[cite: 17].", en: "That's right! Right after they recognized him, he disappeared[cite: 17].", es: "¡Así es! Justo después de reconocerlo, ele desapareció[cite: 17].", ht: "Se sa menm! Touswit apre yo fin rekonèt li, li disparèt[cite: 17]." }
            },
            { 
                q: { pt: "O que Jesus mostrou para os apóstolos em Jerusalém para provar que era ele mesmo?", en: "What did Jesus show to the apostles in Jerusalem to prove it was really him?", es: "¿Qué les mostró Jesús a los apóstoles en Jerusalén para probar que era él mismo?", ht: "Kisa Jezi te montre apòt yo nan Jerizalèm pou l te ka montre se li menm toutbon?" },
                o: { pt: ["Seu barco de pesca", "Suas mãos para eles olharem e tocarem", "Uma moeda de ouro"], en: ["His fishing boat", "His hands for them to look at and touch", "A gold coin"], es: ["Su barco de pesca", "Sus manos para que las miraran y tocaran", "Una moneda de oro"], ht: ["Bato lapèch li a", "Men l yo pou yo te ka gade epi manyen yo", "Yon pyès lajan annò"] },
                c: 1, f: { pt: "Correto! Ele provou que estava vivo em um corpo real[cite: 17].", en: "Correct! He proved he was alive in a real body[cite: 17].", es: "¡Correcto! Probó que estaba vivo en un cuerpo real[cite: 17].", ht: "Kòrèk! Li te montre li vivan toutbon nan yon kò[cite: 17]." }
            },
            { 
                q: { pt: "Quem já tinha dito que o Cristo ia morrer e ser ressuscitado?", en: "Who had already said that the Christ would die and be resurrected?", es: "¿Quiénes ya habían dicho que el Cristo iba a morir y resucitar?", ht: "Kilès ki te di deja Kris la t apral mouri epi l t apral resisite?" },
                o: { pt: ["Os soldados romanos", "Os profetas na Palavra de Deus", "Os reis do Egito"], en: ["The Roman soldiers", "The prophets in God's Word", "The kings of Egypt"], es: ["Los soldados romanos", "Los profetas en la Palabra de Dios", "Los reyes de Egipto"], ht: ["Sòlda women yo", "Pwofèt yo nan Pawòl Bondye a", "Wa Lejip yo"] },
                c: 1, f: { pt: "Excelente! Todas as promessas de Deus se cumprem com perfeição[cite: 17, 18].", en: "Excellent! All of God's promises come true perfectly[cite: 17, 18].", es: "¡Excelente! Todas las promesas de Dios se cumplen a la perfección[cite: 17, 18].", ht: "Ekselan! Tout pwomès Bondye yo fèt yon fason ki pafè[cite: 17, 18]." }
            }
        ];

        let idioma = 'pt';

        function mudarIdioma() {
            idioma = document.getElementById('select-idioma').value;
            renderizar();
        }

        function renderizar() {
            const t = uiTextos[idioma];
            document.getElementById('txt-titulo').innerText = t.titulo;
            document.getElementById('txt-subtitulo').innerText = t.subtitulo;
            document.getElementById('txt-h90').innerText = t.h90;
            document.getElementById('txt-h91').innerText = t.h91;
            document.getElementById('btn-verificar').innerText = t.btn;

            const c90 = document.getElementById('questoes-90');
            const c91 = document.getElementById('questoes-91');
            c90.innerHTML = ''; c91.innerHTML = '';

            dadosQuiz.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'pergunta';
                div.innerHTML = `<p>${i+1}. ${item.q[idioma]}</p>` + 
                    item.o[idioma].map((opt, idx) => `
                        <label>
                            <input type="radio" name="p-${i}" value="${idx}"> ${opt}
                        </label>
                    `).join('') +
                    `<div id="feedback-${i}" class="feedback"></div>`;
                
                if(i < 10) c90.appendChild(div);
                else c91.appendChild(div);
            });
        }

        function verificarRespostas() {
            const t = uiTextos[idioma];
            let total = 0;
            let todasRespondidas = true;

            for(let i=0; i<dadosQuiz.length; i++) {
                if(!document.querySelector(`input[name="p-${i}"]:checked`)) {
                    todasRespondidas = false;
                    break;
                }
            }

            if(!todasRespondidas) {
                alert(t.erro);
                return;
            }

            dadosQuiz.forEach((item, i) => {
                const sel = document.querySelector(`input[name="p-${i}"]:checked`);
                const feedback = document.getElementById(`feedback-${i}`);
                const valor = parseInt(sel.value);
                
                document.getElementsByName(`p-${i}`).forEach(r => r.disabled = true);

                if(valor === item.c) {
                    total++;
                    feedback.className = "feedback correto";
                    feedback.innerText = "⭐ " + item.f[idioma];
                } else {
                    feedback.className = "feedback incorreto";
                    feedback.innerText = "❌ " + t.corretaEra + item.o[idioma][item.c];
                }
                feedback.style.display = 'block';
            });

            const res = document.getElementById('resultado-final');
            res.style.display = 'block';
            res.innerHTML = `<h2>${t.fim}</h2><p>${t.acertou} ${total} ${t.de} ${dadosQuiz.length}!</p>`;
            res.scrollIntoView({ behavior: 'smooth' });
            document.getElementById('btn-verificar').style.display = 'none';
        }

        renderizar();
    </script>
</body>
